<!DOCTYPE html>
<html>
<head>    
<meta charset="UTF-8">
<script>

var lang = navigator.language || navigator.userLanguage;
    console.log('lang', lang)

if(lang.startsWith("es")){
window.location.href="/iptvplayer/es/";
}
else if(lang.startsWith("fr")){
window.location.href="/iptvplayer/fr/";
}
else if(lang.startsWith("pt")){
window.location.href="/iptvplayer/pt/";
}
else{
window.location.href="/iptvplayer/en/";
}

</script>
</head>
<body></body>
</html>
